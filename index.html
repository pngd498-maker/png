<!DOCTYPE html>
<html>

<head>

<title>VEMU Smart Attendance</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e3a8a,#0f172a,#0ea5e9);
color:white;
text-align:center;
}

header{
background:linear-gradient(90deg,#0284c7,#38bdf8);
padding:30px;
font-size:32px;
font-weight:bold;
}

.dashboard{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
}

table{
width:90%;
margin:auto;
margin-top:30px;
border-collapse:collapse;
background:#1e293b;
}

th{
background:#0284c7;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #475569;
}

.student{
background:#334155;
padding:10px;
margin:5px;
cursor:pointer;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
VEMU INSTITUTION OF TECHNOLOGY
<br>
SMART ATTENDANCE SYSTEM
</header>

<div class="dashboard">

<div class="card">
<h3>Present</h3>
<h1 id="present">0</h1>
</div>

<div class="card">
<h3>Late</h3>
<h1 id="late">0</h1>
</div>

<div class="card">
<h3>Attendance %</h3>
<h1 id="percent">0%</h1>
</div>

</div>

<canvas id="chart"></canvas>

<br>

<button onclick="login()">HOD Permission</button>

<div id="students"></div>

<table>

<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

<tbody id="table"></tbody>

</table>

<script>

const firebaseConfig={
databaseURL:"YOUR_FIREBASE_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let present=0;
let late=0;

const chart=new Chart(document.getElementById("chart"),{

type:'bar',

data:{
labels:['Present','Late'],
datasets:[{
data:[0,0],
backgroundColor:['green','red']
}]
}

});

db.ref("attendance").on("child_added",function(snapshot){

let data=snapshot.val()

let row=document.createElement("tr")

row.innerHTML=`
<td>${data.name}</td>
<td>${data.date}</td>
<td>${data.time}</td>
<td>${data.status}</td>
`

document.getElementById("table").appendChild(row)

if(data.status=="Present")present++
if(data.status=="Late")late++

document.getElementById("present").innerText=present
document.getElementById("late").innerText=late

let total=present+late

if(total>0){
let percent=Math.round((present/total)*100)
document.getElementById("percent").innerText=percent+"%"
}

chart.data.datasets[0].data=[present,late]
chart.update()

})

function login(){

let id=prompt("Enter HOD ID")
let pass=prompt("Enter Password")

if(id=="Png_is_hod" && pass=="9014381494"){
loadStudents()
}else{
alert("Access denied")
}

}

function loadStudents(){

let div=document.getElementById("students")

db.ref("students").on("value",function(snapshot){

div.innerHTML=""

snapshot.forEach(function(child){

let name=child.val().name

let s=document.createElement("div")

s.className="student"

s.innerHTML=name+" <button onclick=\"permit('"+name+"')\">Permit</button>"

div.appendChild(s)

})

})

}

function permit(name){

let now=new Date()

db.ref("attendance").push({

name:name,
date:now.toISOString().slice(0,10),
time:now.toTimeString().slice(0,8),
status:"Permitted"

})

}

</script>

</body>
</html>
