<!DOCTYPE html>
<html>

<head>

<title>VEMU Smart Attendance</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#0f172a,#1e3a8a);
color:white;
text-align:center;
margin:0;
}

header{
background:#0284c7;
padding:20px;
font-size:28px;
font-weight:bold;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #38bdf8;}
to{box-shadow:0 0 25px #38bdf8;}
}

.dashboard{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
}

.card h2{
margin:0;
font-size:40px;
color:#22c55e;
}

table{
width:85%;
margin:auto;
margin-top:30px;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th{
background:#0284c7;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #475569;
}

.student{
background:#334155;
padding:10px;
margin:5px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

.student:hover{
background:#475569;
transform:scale(1.05);
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#login{
display:none;
margin-top:20px;
}

#students{
margin-top:20px;
}

</style>

</head>

<body>

<header>
VEMU INSTITUTION OF TECHNOLOGY<br>
SMART ATTENDANCE SYSTEM (ECE-B)
</header>

<div class="dashboard">

<div class="card">
<h3>Present</h3>
<h2 id="presentCount">0</h2>
</div>

<div class="card">
<h3>Late</h3>
<h2 id="lateCount">0</h2>
</div>

</div>

<canvas id="chart" width="400" height="150"></canvas>

<br>

<button onclick="openLogin()">HOD Permission</button>

<div id="login">

<h3>HOD Login</h3>

<input id="hodid" placeholder="HOD ID"><br><br>
<input id="hodpass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</div>

<div id="students"></div>

<table>

<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

<tbody id="table"></tbody>

</table>

<script>

const firebaseConfig={
databaseURL:"YOUR_FIREBASE_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let present=0;
let late=0;

const table=document.getElementById("table");

const chart=new Chart(document.getElementById("chart"),{

type:'bar',

data:{
labels:['Present','Late'],
datasets:[{
data:[0,0],
backgroundColor:['#22c55e','#ef4444']
}]
}

});

db.ref("attendance").on("child_added",function(snapshot){

let data=snapshot.val();

let row=document.createElement("tr");

row.innerHTML=`
<td>${data.name}</td>
<td>${data.date}</td>
<td>${data.time}</td>
<td>${data.status}</td>
`;

table.appendChild(row);

if(data.status=="Present") present++;
if(data.status=="Late") late++;

document.getElementById("presentCount").innerText=present;
document.getElementById("lateCount").innerText=late;

chart.data.datasets[0].data=[present,late];
chart.update();

});


function openLogin(){
document.getElementById("login").style.display="block";
}

function login(){

let id=document.getElementById("hodid").value
let pass=document.getElementById("hodpass").value

if(id=="Png_is_hod" && pass=="9014381494"){

alert("Login Successful")
loadStudents()

}else{

alert("Wrong Credentials")

}

}


function loadStudents(){

let div=document.getElementById("students")

db.ref("students").on("value",function(snapshot){

div.innerHTML=""

snapshot.forEach(function(child){

let name=child.val().name

let s=document.createElement("div")

s.className="student"

s.innerHTML=name+" <button onclick=\"permit('"+name+"')\">Permit</button>"

div.appendChild(s)

})

})

}


function permit(name){

let now=new Date()

let date=now.toISOString().slice(0,10)
let time=now.toTimeString().slice(0,8)

db.ref("attendance").push({

name:name,
date:date,
time:time,
status:"Permitted"

})

alert(name+" permitted by HOD")

}

</script>

</body>
</html>
